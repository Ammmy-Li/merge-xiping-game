<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>合成大奚平</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 10%, rgba(255, 244, 190, 0.9), transparent 28%),
        radial-gradient(circle at 80% 20%, rgba(214, 240, 255, 0.85), transparent 30%),
        radial-gradient(circle at 50% 95%, rgba(255, 210, 226, 0.9), transparent 35%),
        linear-gradient(180deg, #fff8e7, #f8efe2 45%, #f7dce8);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      color: #3b2a24;
    }

    .wrap {
      width: min(430px, 100%);
      background: rgba(255, 255, 255, 0.9);
      border-radius: 26px;
      padding: 16px;
      box-shadow: 0 18px 45px rgba(114, 63, 35, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.9);
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 1px;
    }

    .score {
      background: #fff1f2;
      border: 1px solid #ffd1d9;
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 700;
      min-width: 92px;
      text-align: center;
    }

    .hint {
      font-size: 13px;
      line-height: 1.5;
      opacity: 0.75;
      margin-bottom: 10px;
    }

    .next-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding: 10px 12px;
      background: #fff8f0;
      border-radius: 18px;
      border: 1px solid #ffe0bd;
      font-size: 14px;
    }

    .next-item {
      font-size: 26px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 38px;
      min-height: 38px;
    }

    .next-thumb {
      width: 38px;
      height: 38px;
      object-fit: contain;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(215, 183, 125, 0.55);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      background:
        radial-gradient(circle at 50% 12%, rgba(255, 255, 255, 0.9), transparent 20%),
        radial-gradient(circle at 18% 45%, rgba(255, 246, 205, 0.65), transparent 24%),
        radial-gradient(circle at 82% 72%, rgba(232, 244, 255, 0.65), transparent 26%),
        linear-gradient(180deg, #fffaf0, #f6ead3 55%, #efd6dd);
      border-radius: 22px;
      border: 2px solid #d7b77d;
      touch-action: none;
      cursor: pointer;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      flex: 1;
      border: none;
      border-radius: 16px;
      padding: 11px 12px;
      background: #fb7185;
      color: white;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
    }

    button.secondary {
      background: #f59e0b;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.show {
      display: flex;
    }

    .card {
      width: min(390px, 100%);
      max-height: 82vh;
      overflow-y: auto;
      background: white;
      border-radius: 24px;
      padding: 22px;
      text-align: center;
      box-shadow: 0 16px 45px rgba(0, 0, 0, 0.2);
    }

    .archive-list {
      display: grid;
      gap: 10px;
      margin: 12px 0 18px;
      text-align: left;
    }

    .archive-item {
      display: grid;
      grid-template-columns: 48px 1fr;
      gap: 10px;
      align-items: start;
      padding: 10px;
      border-radius: 16px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
    }

    .archive-item.locked {
      opacity: 0.55;
      background: #f5f5f5;
      border-color: #e5e7eb;
    }

    .archive-icon {
      font-size: 34px;
      line-height: 1;
      text-align: center;
    }

    .archive-thumb {
      width: 42px;
      height: 42px;
      object-fit: contain;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(215, 183, 125, 0.45);
    }

    .unlock-img {
      width: 150px;
      height: 150px;
      object-fit: contain;
      border-radius: 22px;
      background: #fffaf0;
      border: 1px solid #ead7b0;
      box-shadow: 0 8px 24px rgba(114, 63, 35, 0.16);
    }

    .archive-title {
      font-weight: 800;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .archive-desc {
      font-size: 13px;
      line-height: 1.55;
      opacity: 0.85;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 24px;
    }

    .card p {
      margin: 0 0 18px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>合成大奚平</h1>
      <div class="score">分数 <span id="score">0</span></div>
    </div>

    <div class="hint">点击或拖动上方位置放下小物件。两个一样的碰到一起会合成下一级。不要让物件堆过警戒线。</div>

    <div class="next-box">
      <span>下一个：</span>
      <span class="next-item" id="nextItem">🐶</span>
    </div>

    <canvas id="game" width="390" height="700"></canvas>

    <div class="buttons">
      <button id="dropBtn">放下</button>
      <button class="secondary" id="archiveBtn">图鉴</button>
      <button class="secondary" id="restartBtn">重新开始</button>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="card">
      <h2 id="modalTitle">游戏结束</h2>
      <p id="modalText">小狗们堆太高啦。</p>
      <button id="modalRestart">继续</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const nextItemEl = document.getElementById("nextItem");
    const dropBtn = document.getElementById("dropBtn");
    const archiveBtn = document.getElementById("archiveBtn");
    const restartBtn = document.getElementById("restartBtn");
    const modal = document.getElementById("modal");
    const modalTitle = document.getElementById("modalTitle");
    const modalText = document.getElementById("modalText");
    const modalRestart = document.getElementById("modalRestart");

    const W = 390;
    const H = 700;
    const floorY = H - 14;
    const dangerY = 95;

    function setupHiDPICanvas() {
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      canvas.style.width = "100%";
      canvas.style.height = "auto";
      canvas.width = Math.round(W * dpr);
      canvas.height = Math.round(H * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";
    }

    setupHiDPICanvas();

    const items = [
      {
        label: "奚士庸",
        unlockTitle: "国色天香奚士庸",
        emoji: "🪭",
        img: "xishiyong.PNG",
        r: 40,
        score: 2,
        desc: "奚平一时忘了将打开的折扇收回去，扇面上“国色天香”四个大字横陈胸前，他呆成了一只国色天香的木鸡。"
      },
      {
        label: "余甘公",
        unlockTitle: "金平著名私奔专业户余甘公",
        emoji: "🎼",
        img: "yugangong.PNG",
        r: 50,
        score: 4,
        desc: "人家都说了，昨夜‘余甘公’亲自弹琴，就是牵头驴上去叫唤两声也能夺魁。"
      },
      {
        label: "猫主子",
        unlockTitle: "欺软怕硬猫主子",
        emoji: "🐱",
        img: "cat.PNG",
        r: 62,
        score: 8,
        desc: "猫欺软怕硬，斗不过姓奚的，就冲主人撒气，一爪子扇了回去。幸亏庄王躲习惯了，没伤到手，只被猫爪勾开了长袖上的丝。"
      },
      {
        label: "吃喝玩乐",
        unlockTitle: "本人精通吃喝玩乐",
        emoji: "🍷",
        img: "chihewanle.PNG",
        r: 76,
        score: 16,
        desc: "奚平更惊恐了：“还长生？一天练三四个时辰的剑，练它个八百一千年？师叔，我要是犯了什么错，您就揍我一顿吧，我感觉我罪不至此！”"
      },
      {
        label: "太岁神像",
        unlockTitle: "太岁神像",
        emoji: "🪵",
        img: "taisui_statue.PNG",
        r: 94,
        score: 32,
        desc: "“不关你的事，让你毁几块木牌，总不伤你那一堆道义良心吧？”"
      },
      {
        label: "太岁琴",
        unlockTitle: "太岁琴",
        emoji: "🎻",
        img: "taisui_qin.PNG",
        r: 110,
        score: 64,
        desc: "那琴是他的本命琴，自他骨中生，弹他心头意，因他而得名......居然真能越过转生木。唯一的问题是，他的本命琴不是挂在墙上能让人随手拨的！"
      },
      {
        label: "奚平",
        unlockTitle: "奚平",
        emoji: "✨",
        img: "xiping.PNG",
        r: 132,
        score: 128,
        desc: "‘我飞琼峰门下愿为天下祭。’"
      },
      {
        label: "大耳朵驴",
        unlockTitle: "全包眼线大耳朵驴",
        emoji: "🫏",
        img: "king.PNG",
        r: 156,
        score: 256,
        desc: "恭喜你解锁最大宝藏，来领取属于你的比格皇帝吧！"
      }
    ];

    for (const item of items) {
      if (item.img) {
        item.image = new Image();
        item.image.src = item.img;
      }
    }

    let balls = [];
    let currentX = W / 2;
    let nextLevel = 0;
    let score = 0;
    let gameOver = false;
    let canDrop = true;
    let frame = 0;
    let unlockedLevels = new Set([0]);

    function randomLevel() {
      const roll = Math.random();
      if (roll < 0.55) return 0;
      if (roll < 0.82) return 1;
      if (roll < 0.95) return 2;
      return 3;
    }

    function reset() {
      balls = [];
      currentX = W / 2;
      nextLevel = randomLevel();
      score = 0;
      gameOver = false;
      canDrop = true;
      frame = 0;
      unlockedLevels = new Set([0]);
      scoreEl.textContent = score;
      updateNextItem();
      modal.classList.remove("show");
    }

    function showModal(title, text) {
      modalTitle.textContent = title;
      modalText.textContent = text;
      modal.classList.add("show");
    }

    function itemVisualHTML(item, className) {
      if (item.img) {
        return `<img class="${className}" src="${item.img}" alt="${item.label}">`;
      }
      return item.emoji;
    }

    function updateNextItem() {
      nextItemEl.innerHTML = itemVisualHTML(items[nextLevel], "next-thumb");
    }

    function drawImageContain(image, x, y, size) {
      const iw = image.naturalWidth || image.width;
      const ih = image.naturalHeight || image.height;
      if (!iw || !ih) return false;

      const scale = Math.min(size / iw, size / ih);
      const dw = iw * scale;
      const dh = ih * scale;
      ctx.drawImage(image, x - dw / 2, y - dh / 2, dw, dh);
      return true;
    }

    function drawItemVisual(item, x, y, r) {
      if (item.image && item.image.complete && item.image.naturalWidth) {
        drawImageContain(item.image, x, y, r * 2.25);
      } else {
        ctx.font = `${Math.max(20, r * 1.15)}px serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(item.emoji || "?", x, y + 1);
      }
    }

    function showUnlockModal(level) {
      const item = items[level];
      modalTitle.textContent = "解锁：" + (item.unlockTitle || item.label);
      modalText.innerHTML = `
        <div style="margin:8px 0 14px; text-align:center;">${itemVisualHTML(item, "unlock-img")}</div>
        <div style="font-size:15px; line-height:1.7; text-align:left;">${item.desc}</div>
      `;
      modalRestart.textContent = "继续合成";
      modal.classList.add("show");
    }

    function showArchive() {
      modalTitle.textContent = "图鉴";
      modalText.innerHTML = `
        <div class="archive-list">
          ${items.map((item, index) => {
            const unlocked = unlockedLevels.has(index);
            return `
              <div class="archive-item ${unlocked ? "" : "locked"}">
                <div class="archive-icon">${unlocked ? itemVisualHTML(item, "archive-thumb") : "❔"}</div>
                <div>
                  <div class="archive-title">${unlocked ? (item.unlockTitle || item.label) : "？？？"}</div>
                  <div class="archive-desc">${unlocked ? item.desc : "尚未解锁。继续合成看看会出现什么。"}</div>
                </div>
              </div>
            `;
          }).join("")}
        </div>
      `;
      modalRestart.textContent = "关闭图鉴";
      modal.classList.add("show");
    }

    function dropBall() {
      if (gameOver || !canDrop) return;
      const item = items[nextLevel];
      const x = Math.max(item.r + 8, Math.min(W - item.r - 8, currentX));
      balls.push({
        x,
        y: 48,
        vx: 0,
        vy: 0,
        level: nextLevel,
        r: item.r,
        merging: false,
        born: frame
      });
      nextLevel = randomLevel();
      updateNextItem();
      canDrop = false;
      setTimeout(() => { canDrop = true; }, 380);
    }

    function mergeBalls(a, b) {
      if (a.merging || b.merging) return;
      if (a.level !== b.level) return;
      if (a.level >= items.length - 1) return;

      a.merging = true;
      b.merging = true;

      const newLevel = a.level + 1;
      const newItem = items[newLevel];
      const nx = (a.x + b.x) / 2;
      const ny = (a.y + b.y) / 2;

      balls = balls.filter(ball => ball !== a && ball !== b);
      balls.push({
        x: nx,
        y: ny,
        vx: (a.vx + b.vx) * 0.25,
        vy: -2.2,
        level: newLevel,
        r: newItem.r,
        merging: false,
        born: frame
      });

      score += newItem.score;
      scoreEl.textContent = score;

      if (!unlockedLevels.has(newLevel)) {
        unlockedLevels.add(newLevel);
        setTimeout(() => showUnlockModal(newLevel), 80);
      }

      // 合成到最大等级后，不结束游戏。最大的物件会留在场上，继续占位置。
      // 如果场上有两个最大的物件，它们也不会再继续合成。
    }

    function updatePhysics() {
      if (gameOver) return;

      for (const b of balls) {
        b.vy += 0.32;
        b.vx *= 0.993;
        b.vy *= 0.997;
        b.x += b.vx;
        b.y += b.vy;

        if (b.x - b.r < 8) {
          b.x = b.r + 8;
          b.vx *= -0.55;
        }
        if (b.x + b.r > W - 8) {
          b.x = W - b.r - 8;
          b.vx *= -0.55;
        }
        if (b.y + b.r > floorY) {
          b.y = floorY - b.r;
          b.vy *= -0.35;
          b.vx *= 0.9;
        }
      }

      for (let i = 0; i < balls.length; i++) {
        for (let j = i + 1; j < balls.length; j++) {
          const a = balls[i];
          const b = balls[j];
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const dist = Math.hypot(dx, dy) || 0.001;
          const minDist = a.r + b.r;

          if (dist < minDist) {
            if (a.level === b.level && frame - a.born > 8 && frame - b.born > 8) {
              mergeBalls(a, b);
              return;
            }

            const overlap = minDist - dist;
            const nx = dx / dist;
            const ny = dy / dist;
            const push = overlap / 2;

            a.x -= nx * push;
            a.y -= ny * push;
            b.x += nx * push;
            b.y += ny * push;

            const tx = -ny;
            const ty = nx;
            const dpTanA = a.vx * tx + a.vy * ty;
            const dpTanB = b.vx * tx + b.vy * ty;
            const dpNormA = a.vx * nx + a.vy * ny;
            const dpNormB = b.vx * nx + b.vy * ny;

            a.vx = tx * dpTanA + nx * dpNormB * 0.75;
            a.vy = ty * dpTanA + ny * dpNormB * 0.75;
            b.vx = tx * dpTanB + nx * dpNormA * 0.75;
            b.vy = ty * dpTanB + ny * dpNormA * 0.75;
          }
        }
      }

      const tooHigh = balls.some(b => b.y - b.r < dangerY && frame - b.born > 150);
      if (tooHigh) {
        gameOver = true;
        showModal("游戏结束", "小物件堆过警戒线啦。分数：" + score);
        modalRestart.textContent = "再来一次";
      }
    }

    function drawBall(b) {
      const item = items[b.level];
      const gradient = ctx.createRadialGradient(b.x - b.r * 0.35, b.y - b.r * 0.35, b.r * 0.2, b.x, b.y, b.r);
      gradient.addColorStop(0, "rgba(255, 255, 255, 0.7)");
      gradient.addColorStop(1, "rgba(255, 228, 230, 0.28)");

      ctx.save();
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fillStyle = gradient;
      ctx.fill();
      ctx.lineWidth = 1;
      ctx.strokeStyle = "rgba(215, 183, 125, 0.35)";
      ctx.stroke();

      drawItemVisual(item, b.x, b.y, b.r);
      ctx.restore();
    }

    function draw() {
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";
      ctx.clearRect(0, 0, W, H);

      ctx.save();
      ctx.strokeStyle = "rgba(244, 63, 94, 0.35)";
      ctx.setLineDash([8, 8]);
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(12, dangerY);
      ctx.lineTo(W - 12, dangerY);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = "rgba(136, 53, 70, 0.55)";
      ctx.font = "13px sans-serif";
      ctx.fillText("警戒线", 20, dangerY - 8);
      ctx.restore();

      const item = items[nextLevel];
      const previewY = 45;
      const previewR = item.r;
      const previewX = Math.max(previewR + 8, Math.min(W - previewR - 8, currentX));

      ctx.save();
      ctx.globalAlpha = canDrop && !gameOver ? 0.9 : 0.35;
      ctx.beginPath();
      ctx.arc(previewX, previewY, previewR, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255, 255, 255, 0.45)";
      ctx.fill();
      ctx.strokeStyle = "rgba(215, 183, 125, 0.35)";
      ctx.lineWidth = 1;
      ctx.stroke();
      drawItemVisual(item, previewX, previewY, previewR);
      ctx.restore();

      for (const b of balls) drawBall(b);
    }

    function loop() {
      frame++;
      updatePhysics();
      draw();
      requestAnimationFrame(loop);
    }

    function setCurrentX(clientX) {
      const rect = canvas.getBoundingClientRect();
      const scale = W / rect.width;
      currentX = (clientX - rect.left) * scale;
    }

    canvas.addEventListener("mousemove", e => setCurrentX(e.clientX));
    canvas.addEventListener("click", e => {
      setCurrentX(e.clientX);
      dropBall();
    });

    canvas.addEventListener("touchmove", e => {
      e.preventDefault();
      setCurrentX(e.touches[0].clientX);
    }, { passive: false });

    canvas.addEventListener("touchend", e => {
      e.preventDefault();
      dropBall();
    }, { passive: false });

    dropBtn.addEventListener("click", dropBall);
    archiveBtn.addEventListener("click", showArchive);
    restartBtn.addEventListener("click", reset);
    modalRestart.addEventListener("click", () => {
      if (gameOver) {
        reset();
      } else {
        modal.classList.remove("show");
      }
    });

    reset();
    loop();
  </script>
</body>
</html>
